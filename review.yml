    summary: >-
      Lancaster University (QS World 2025 #141) has a modest but real public,
      machine-accessible footprint rather than a self-service API developer
      portal. Verified live: the Lancaster EPrints OAI-PMH 2.0 endpoint returns
      a valid Identify response (repositoryName "Lancaster EPrints", EPrints
      3.4.5). The Library's GitHub org (lulibrary) and main org
      (lancaster-university) host open-source integration code including an
      Alma webhook handler and Pure metadata tooling. Library loan/fine APIs
      exist via Ex Libris Alma/Primo (documented on the Ex Libris developer
      blog) but are internal/gated, powering the iLancaster app. The
      www.lancaster.ac.uk/api/ path returns a "Not authorised" page, i.e. not a
      public API portal. No endpoints were fabricated.
